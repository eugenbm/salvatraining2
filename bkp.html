<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Quiz – Manualul Salvatorului Montan</title>
  <style>
    /* ===== RESET & BASE ===== */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      min-height: 100vh;
      color: #e0e0e0;
      padding: 20px;
    }

    /* ===== HEADER ===== */
    .header {
      text-align: center;
      padding: 30px 20px 20px;
    }
    .header h1 {
      font-size: clamp(1.4rem, 4vw, 2.2rem);
      color: #e94560;
      text-shadow: 0 0 20px rgba(233,69,96,0.5);
      margin-bottom: 8px;
    }
    .header p {
      color: #a0aec0;
      font-size: 0.95rem;
    }

    /* ===== MODULE SELECTOR ===== */
    .module-selector {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: center;
      padding: 20px;
      max-width: 900px;
      margin: 0 auto;
    }
    .module-btn {
      background: rgba(255,255,255,0.05);
      border: 2px solid rgba(233,69,96,0.3);
      color: #e0e0e0;
      padding: 10px 18px;
      border-radius: 25px;
      cursor: pointer;
      font-size: 0.85rem;
      transition: all 0.3s ease;
      white-space: nowrap;
    }
    .module-btn:hover, .module-btn.active {
      background: #e94560;
      border-color: #e94560;
      color: #fff;
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(233,69,96,0.4);
    }

    /* ===== QUIZ CONTAINER ===== */
    .quiz-container {
      max-width: 800px;
      margin: 0 auto;
      padding: 10px 20px 40px;
    }

    /* ===== PROGRESS ===== */
    .progress-bar-wrap {
      background: rgba(255,255,255,0.1);
      border-radius: 10px;
      height: 8px;
      margin-bottom: 20px;
      overflow: hidden;
    }
    .progress-bar {
      height: 100%;
      background: linear-gradient(90deg, #e94560, #f6a623);
      border-radius: 10px;
      transition: width 0.4s ease;
    }
    .progress-text {
      text-align: right;
      font-size: 0.8rem;
      color: #a0aec0;
      margin-bottom: 6px;
    }

    /* ===== CARD ===== */
    .card {
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 16px;
      padding: 28px;
      margin-bottom: 20px;
      animation: fadeIn 0.4s ease;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(15px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .module-label {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: #e94560;
      margin-bottom: 10px;
    }
    .question-text {
      font-size: 1.1rem;
      line-height: 1.6;
      color: #f0f0f0;
      margin-bottom: 22px;
    }

    /* ===== OPTIONS ===== */
    .options { display: flex; flex-direction: column; gap: 10px; }
    .option-btn {
      background: rgba(255,255,255,0.06);
      border: 2px solid rgba(255,255,255,0.15);
      color: #e0e0e0;
      padding: 13px 18px;
      border-radius: 10px;
      cursor: pointer;
      text-align: left;
      font-size: 0.95rem;
      transition: all 0.25s ease;
      line-height: 1.4;
    }
    .option-btn:hover:not(:disabled) {
      background: rgba(233,69,96,0.15);
      border-color: #e94560;
      transform: translateX(4px);
    }
    .option-btn.correct {
      background: rgba(72,199,142,0.2);
      border-color: #48c78e;
      color: #48c78e;
    }
    .option-btn.wrong {
      background: rgba(233,69,96,0.2);
      border-color: #e94560;
      color: #e94560;
    }
    .option-btn:disabled { cursor: default; }

    /* ===== FEEDBACK ===== */
    .feedback {
      margin-top: 16px;
      padding: 14px 18px;
      border-radius: 10px;
      font-size: 0.9rem;
      line-height: 1.5;
      display: none;
    }
    .feedback.show { display: block; animation: fadeIn 0.3s ease; }
    .feedback.correct-fb {
      background: rgba(72,199,142,0.15);
      border: 1px solid #48c78e;
      color: #48c78e;
    }
    .feedback.wrong-fb {
      background: rgba(233,69,96,0.15);
      border: 1px solid #e94560;
      color: #f0a0a0;
    }

    /* ===== NAVIGATION ===== */
    .nav-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 20px;
      gap: 10px;
      flex-wrap: wrap;
    }
    .nav-btn {
      background: linear-gradient(135deg, #e94560, #c0392b);
      border: none;
      color: #fff;
      padding: 11px 26px;
      border-radius: 25px;
      cursor: pointer;
      font-size: 0.9rem;
      font-weight: 600;
      transition: all 0.3s ease;
      box-shadow: 0 4px 15px rgba(233,69,96,0.3);
    }
    .nav-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(233,69,96,0.5); }
    .nav-btn:disabled { opacity: 0.4; cursor: default; transform: none; }
    .nav-btn.secondary {
      background: rgba(255,255,255,0.1);
      box-shadow: none;
      border: 1px solid rgba(255,255,255,0.2);
    }
    .nav-btn.secondary:hover { background: rgba(255,255,255,0.18); }

    /* ===== SCORE PANEL ===== */
    .score-panel {
      text-align: center;
      padding: 40px 20px;
      animation: fadeIn 0.5s ease;
    }
    .score-circle {
      width: 130px;
      height: 130px;
      border-radius: 50%;
      background: conic-gradient(#e94560 0%, #e94560 var(--pct), rgba(255,255,255,0.1) var(--pct));
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 20px;
      position: relative;
    }
    .score-circle::before {
      content: '';
      position: absolute;
      width: 100px;
      height: 100px;
      border-radius: 50%;
      background: #16213e;
    }
    .score-number {
      position: relative;
      z-index: 1;
      font-size: 1.8rem;
      font-weight: 700;
      color: #e94560;
    }
    .score-panel h2 { font-size: 1.5rem; color: #f0f0f0; margin-bottom: 10px; }
    .score-panel p  { color: #a0aec0; margin-bottom: 6px; }
    .score-panel .grade {
      font-size: 1.1rem;
      font-weight: 700;
      margin: 14px 0;
      padding: 8px 20px;
      border-radius: 20px;
      display: inline-block;
    }
    .grade.excellent { background: rgba(72,199,142,0.2); color: #48c78e; border: 1px solid #48c78e; }
    .grade.good      { background: rgba(246,166,35,0.2);  color: #f6a623; border: 1px solid #f6a623; }
    .grade.poor      { background: rgba(233,69,96,0.2);   color: #e94560; border: 1px solid #e94560; }

    /* ===== STATS ===== */
    .stats-row {
      display: flex;
      justify-content: center;
      gap: 20px;
      flex-wrap: wrap;
      margin: 16px 0 24px;
    }
    .stat-box {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 12px;
      padding: 14px 22px;
      text-align: center;
      min-width: 100px;
    }
    .stat-box .val { font-size: 1.6rem; font-weight: 700; color: #e94560; }
    .stat-box .lbl { font-size: 0.75rem; color: #a0aec0; margin-top: 4px; }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 480px) {
      .card { padding: 18px; }
      .question-text { font-size: 1rem; }
      .option-btn { font-size: 0.88rem; padding: 11px 14px; }
    }
  </style>
</head>
<body>

<div class="header">
  <h1>🏔️ Quiz – Manualul Salvatorului Montan</h1>
  <p>Testează-ți cunoștințele despre salvarea montană</p>
</div>

<!-- MODULE SELECTOR -->
<div class="module-selector" id="moduleSelector">
  <button class="module-btn active" data-module="all">📚 Toate modulele</button>
  <button class="module-btn" data-module="0">🎒 Materiale & Echipament</button>
  <button class="module-btn" data-module="1">🪢 Noduri & Asigurări</button>
  <button class="module-btn" data-module="2">🧗 Tehnica Cățărării</button>
  <button class="module-btn" data-module="3">⬇️ Rapel & Coborâre</button>
  <button class="module-btn" data-module="4">⚙️ Dispozitive de Tracțiune</button>
  <button class="module-btn" data-module="5">🚑 Transport Accidentați</button>
  <button class="module-btn" data-module="6">❄️ Avalanșe</button>
  <button class="module-btn" data-module="7">🔍 Căutare & Salvare Avalanșă</button>
</div>

<!-- QUIZ AREA -->
<div class="quiz-container">
  <div id="quizArea"></div>
</div>

<script>
// =====================================================================
//  QUESTION BANK  (8 modules, 10 questions each = 80 total)
// =====================================================================
const modules = [

  // ── MODULE 0 ── Materiale & Echipament ──────────────────────────────
  {
    name: "Materiale & Echipament",
    icon: "🎒",
    questions: [
      {
        q: "Conform manualului, pentru câți salvatori montani este realizată lista de materiale necesare unei acțiuni de salvare montană?",
        opts: ["4 salvatori", "6 salvatori", "8 salvatori", "10 salvatori"],
        ans: 1,
        exp: "Lista materialelor este realizată pentru o echipă compusă din șase salvatori montani, atât pentru sezonul de vară cât și pentru cel de iarnă."
      },
      {
        q: "Câte categorii de materiale sunt necesare pentru o acțiune de salvare montană în sezonul de VARĂ?",
        opts: ["3 categorii", "4 categorii", "5 categorii", "6 categorii"],
        ans: 1,
        exp: "În sezonul de vară sunt necesare 4 categorii: materiale pentru alpinism, materiale pentru transportul accidentaților, aparatură pentru telecomunicații și aparatură de semnalizare."
      },
      {
        q: "Ce categorie suplimentară de materiale apare în sezonul de IARNĂ față de sezonul de vară?",
        opts: ["Materiale medicale", "Aparatură de căutare în avalanșă", "Materiale de orientare", "Echipament termic"],
        ans: 1,
        exp: "În sezonul de iarnă apare o a 5-a categorie: aparatura de căutare în avalanșă (PIEPS, sonde, lopete)."
      },
      {
        q: "Care este rezistența specificată pentru carabinierele expres din lista de materiale de vară?",
        opts: ["1000 KN", "2500 KN", "38 KN", "50 KN"],
        ans: 1,
        exp: "Carabinierele expres au o rezistență de 2500 KN, conform tabelului de materiale pentru sezonul de vară."
      },
      {
        q: "Ce rezistență are coarda statică specificată în lista de materiale?",
        opts: ["Ø11mm – 23,6 KN", "Ø11mm – 29,2 KN", "Ø10mm – 18 KN", "Ø12mm – 35 KN"],
        ans: 1,
        exp: "Coarda statică are diametrul de 11mm și rezistența de 29,2 KN, față de coarda dinamică care are 23,6 KN."
      },
      {
        q: "Care dintre următoarele NU este un tip de piton menționat în manual?",
        opts: ["Piton clasic", "Piton de expansiune", "Piton rotativ", "Piton pentru zăpadă"],
        ans: 2,
        exp: "Manualul menționează: piton clasic, piton de expansiune, nuc, tendon, pitoaie pentru zăpadă și pitoaie pentru gheață. Pitonul rotativ nu există în această clasificare."
      },
      {
        q: "Ce tip de targă este menționată ca utilaj principal pentru transportul accidentaților în sezonul de vară?",
        opts: ["Targa AKJA", "Targa universală cu roată (UT 2000)", "Targa canadiană", "Saltea cu vacuum"],
        ans: 1,
        exp: "Targa universală cu roată (UT 2000, tip Alpină, Tiromont, Mariner etc.) este menționată ca material principal pentru transportul accidentaților în sezonul de vară."
      },
      {
        q: "Ce frecvență folosesc aparatele R.T.P. din dotarea echipei de salvare montană?",
        opts: ["457 KHz", "160 MHz / 149,20 MHz", "2275 Hz", "900 MHz"],
        ans: 1,
        exp: "Aparatele R.T.P. funcționează pe frecvențele 160 MHz și 149,20 MHz, conform tabelului de aparatură pentru telecomunicații."
      },
      {
        q: "Câte scărițe sunt prevăzute în lista de materiale pentru alpinism (sezon de vară)?",
        opts: ["4 bucăți", "6 bucăți", "8 bucăți", "10 bucăți"],
        ans: 2,
        exp: "Sunt prevăzute 8 scărițe cu lungimea de 120-150 cm în lista de materiale pentru alpinism, sezon de vară."
      },
      {
        q: "Care este puterea proiectorului portabil din aparatura de semnalizare?",
        opts: ["10 W", "20 W", "50 W", "100 W"],
        ans: 1,
        exp: "Proiectorul portabil este halogen de 20 W, conform tabelului de aparatură de semnalizare."
      },
    ]
  },

  // ── MODULE 1 ── Noduri & Asigurări ──────────────────────────────────
  {
    name: "Noduri & Asigurări",
    icon: "🪢",
    questions: [
      {
        q: "Care nod este supranumit 'regele nodurilor' în manualul salvatorului montan?",
        opts: ["Nodul Prusik", "Nodul în opt", "Nodul cabestan", "Nodul bulin"],
        ans: 1,
        exp: "Nodul în opt este supranumit pe drept 'regele nodurilor', deoarece poate fi folosit în mai multe scopuri."
      },
      {
        q: "Ce condiție trebuie să îndeplinească un nod pentru a fi considerat bine însușit?",
        opts: ["Să poată fi realizat doar cu ambele mâini", "Să poată fi realizat în orice poziție, condiții și chiar cu o singură mână", "Să fie realizat în mai puțin de 10 secunde", "Să nu necesite carabinieră"],
        ans: 1,
        exp: "Un nod este bine însușit atunci când poate fi realizat în orice poziție, în orice condiții (chiar și pe întuneric) și chiar cu o singură mână."
      },
      {
        q: "Care este dezavantajul nodului 'opt dublu'?",
        opts: ["Nu este sigur sub sarcină", "Nu poate fi făcut decât cu ambele mâini și recuperarea este anevoioasă", "Alunecă pe coardă", "Nu poate fi folosit la autoasigurare"],
        ans: 1,
        exp: "Nodul opt dublu este sigur, dar dezavantajul său este că nu poate fi făcut decât cu ambele mâini și recuperarea lui este mai anevoioasă."
      },
      {
        q: "Nodul Prusik este folosit în principal pentru:",
        opts: ["Legarea a două corzi cap la cap", "Blocarea sarcinii și urcarea pe coardă fixă", "Rapel fără echipament", "Ancorarea în puncte fixe"],
        ans: 1,
        exp: "Nodul Prusik (și variantele sale) sunt folosite pentru blocarea sarcinii, din acest motiv fiind foarte bune la urcarea pe coardă fixă."
      },
      {
        q: "Câte puncte fixe se recomandă minim la amenajarea unui punct de amaraj în salvarea montană?",
        opts: ["1 punct fix", "2 puncte fixe", "4 puncte fixe", "6 puncte fixe"],
        ans: 1,
        exp: "Se recomandă amenajarea punctului de amaraj în cel puțin două puncte fixe, deoarece forțele care acționează pot ajunge la 2000-2500 kgF."
      },
      {
        q: "Ce nod se folosește la autoasigurarea salvatorilor montani în regrupare?",
        opts: ["Nodul dublu pescăresc", "Nodul cabestan sau nodul opt simplu", "Nodul semicabestan", "Nodul de scaun"],
        ans: 1,
        exp: "Autoasigurarea se face prin intermediul unei bucle de coardă cu diametrul de 8mm, prinsă de punctul fix prin nodul cabestan sau nodul opt simplu, și de vestă prin nodul opt dublu."
      },
      {
        q: "Care nod este recomandat pentru asigurarea dinamică în deplasare?",
        opts: ["Nodul opt dublu", "Nodul semicabestan", "Nodul Prusik", "Nodul de scaun"],
        ans: 1,
        exp: "Nodul semicabestan este recomandat pentru asigurarea dinamică, deoarece este ușor de realizat și recuperat și poate fi executat cu o singură mână."
      },
      {
        q: "Nodul 'Nodul de scaun' este folosit când:",
        opts: ["Trebuie să blocăm o coardă sub tensiune", "Avem nevoie de două bucle la capătul unei corzi sau cordeline reglabile", "Legăm două corzi cap la cap", "Executăm rapelul Dülfer"],
        ans: 1,
        exp: "Nodul de scaun este folosit în general în cazul în care avem nevoie de două bucle la capătul unei corzi sau cordeline, aceasta fiind reglabilă."
      },
      {
        q: "Ce se întâmplă cu rezistența unei corzi prin înnodare?",
        opts: ["Crește cu 20%", "Rămâne neschimbată", "Se reduce cu cca. 50%", "Se reduce cu 10%"],
        ans: 2,
        exp: "Prin înnodare, rezistența unei corzi se reduce cu circa 50%, de aceea în condiții normale este permisă doar o singură înnodare."
      },
      {
        q: "Care nod NU este recomandat pentru coborârea (lansarea) salvatorului pe perete?",
        opts: ["Nodul semicabestan", "Nodul opt", "Nodul Prusik (pentru siguranță)", "Dispozitiv de frânare"],
        ans: 1,
        exp: "La coborâre (lansare), asigurarea se face prin nodul semicabestan sau cu ajutorul unui dispozitiv de frânare. Nodul opt NU este recomandat pentru această tehnică."
      },
    ]
  },

  // ── MODULE 2 ── Tehnica Cățărării ────────────────────────────────────
  {
    name: "Tehnica Cățărării",
    icon: "🧗",
    questions: [
      {
        q: "Câte puncte sigure de sprijin trebuie să existe în orice moment în timpul cățărării libere?",
        opts: ["1 punct", "2 puncte", "3 puncte", "4 puncte"],
        ans: 2,
        exp: "În orice moment trebuie să existe cel puțin trei puncte sigure de sprijin, alternând mutarea unei mâini cu un picior."
      },
      {
        q: "Ce tip de echilibru se recomandă în cățărarea liberă?",
        opts: ["Echilibru dinamic (salturi)", "Echilibru static (mers ritmic)", "Echilibru pe vârfuri", "Echilibru pe genunchi"],
        ans: 1,
        exp: "Cățărarea nu se face în salturi (în echilibrul dinamic) ci în mers ritmic, în echilibrul static, cum spun specialiștii."
      },
      {
        q: "Care parte a bocancului se folosește la urcare în cățărarea liberă?",
        opts: ["Călcâiul", "Toată talpa", "Vârful bocancului (și puțin din partea laterală)", "Partea interioară a tălpii"],
        ans: 2,
        exp: "La urcare se folosește vârful bocancului (espadrilei), eventual și puțin din partea laterală."
      },
      {
        q: "Cum se coboară pasajele dificile în cățărarea liberă?",
        opts: ["Cu spatele la perete", "Cu fața la perete, privind printre picioare", "Lateral față de perete", "Prin rapel obligatoriu"],
        ans: 1,
        exp: "La coborârea pasajelor dificile, cățărarea se face cu fața la perete, privirea făcându-se, în acel caz, printre picioare."
      },
      {
        q: "Ce este cățărarea artificială?",
        opts: ["Cățărarea cu ajutorul unui elicopter", "Utilizarea pitonului ca priză de mână sau picior, cu scarița", "Cățărarea pe perete artificial de sală", "Cățărarea cu ajutorul unui troliu"],
        ans: 1,
        exp: "Prin a te cățăra în artificial se înțelege a utiliza pitonul ca priză de mână sau de picior, a pune o scarița în el și piciorul în scarița."
      },
      {
        q: "Ce tipuri de prize pot fi folosite în cățărarea liberă?",
        opts: ["Numai prize de tracțiune și de sprijin", "Prize de tracțiune, imprimare, aderență, sprijin și chei", "Numai prize de mână", "Prize de aderență și chei"],
        ans: 1,
        exp: "Prizele naturale pot fi: de tracțiune, de imprimare, de aderență, de sprijin și chei. Se folosesc atât prize de mână cât și prize de picior."
      },
      {
        q: "Ce este tehnica 'ramonaj'?",
        opts: ["O tehnică de rapel fără echipament", "Cățărarea interioară a hornurilor și diedrelor prin opoziție spate-picioare", "O metodă de ancorare în stâncă", "O tehnică de traversare oblică"],
        ans: 1,
        exp: "Ramonajul (opoziție spate-picioare) este un procedeu foarte răspândit pentru cățărarea interioară a hornurilor și diedrelor, atât la urcare cât și la coborâre."
      },
      {
        q: "Ce trebuie verificat înaintea unui punct dificil de cățărare?",
        opts: ["Lungimea corzii", "Vârful espadrilei (se curăță)", "Numărul de pitoaie disponibile", "Direcția vântului"],
        ans: 1,
        exp: "Înaintea unui punct dificil, se curăță vârful espadrilei pentru o aderență mai bună."
      },
      {
        q: "Care este primul principiu al tehnicii 'Eckenstein' cu coltari?",
        opts: ["Fixarea pioletului, deplasarea unui picior, deplasarea celuilalt picior", "Deplasarea rapidă fără oprire", "Folosirea exclusivă a colților frontali", "Menținerea corpului perpendicular pe pantă"],
        ans: 0,
        exp: "Ordinea mișcărilor în tehnica Eckenstein este: fixarea pioletului, deplasarea unui picior, deplasarea celuilalt picior. Presiunea exercitată de coltar trebuie să fie aceeași în orice punct."
      },
      {
        q: "Traversările în cățărare pot fi:",
        opts: ["Numai orizontale", "Numai descendente", "Orizontale, oblice, ascendente sau descendente", "Numai artificiale"],
        ans: 2,
        exp: "Traversările orizontale, oblice, ascendente sau descendente se pot face prin cățărare liberă sau artificială, dacă există priză suficientă și sigură."
      },
    ]
  },

  // ── MODULE 3 ── Rapel & Coborâre ─────────────────────────────────────
  {
    name: "Rapel & Coborâre",
    icon: "⬇️",

        exp: "Când semnalul slăbește, se marchează punctul A. Se reorientează receptorul pentru semnal maxim, se reduce volumul, se caută perpendicular. Cele două puncte A și A' încadrează poziția victimei."
      },
      {
        q: "Care sunt cele trei faze ale operațiunilor de salvare organizate din zone montane?",
        opts: ["Alertare, intervenție, evacuare", "Faza I (acțiunea imediată cu sondare brută), Faza II (reducerea vieții și transportul victimei), Faza auxiliară", "Localizare, extragere, transport medical", "Recunoaștere, intervenție, debriefing"],
        ans: 1,
        exp: "Fazele sunt: Faza I - Acțiunea imediată (trimiterea rapidă a coloanelor cu sonde, lopete, echipament); Faza II - Reducerea vieții și transportul victimei; Faza auxiliară (echipament suplimentar)."
      },
    ]
  },
];

// =====================================================================
//  STATE
// =====================================================================
let activeModuleIdx = "all";   // "all" or 0-7
let questionPool    = [];
let currentIdx      = 0;
let score           = 0;
let answered        = false;
let wrongAnswers    = [];

// =====================================================================
//  BUILD POOL
// =====================================================================
function buildPool(moduleIdx) {
  if (moduleIdx === "all") {
    questionPool = [];
    modules.forEach((mod, mi) => {
      mod.questions.forEach(q => {
        questionPool.push({ ...q, moduleIdx: mi });
      });
    });
  } else {
    questionPool = modules[moduleIdx].questions.map(q => ({
      ...q, moduleIdx: moduleIdx
    }));
  }
  // Shuffle
  for (let i = questionPool.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [questionPool[i], questionPool[j]] = [questionPool[j], questionPool[i]];
  }
}

// =====================================================================
//  RENDER
// =====================================================================
function renderQuestion() {
  const area = document.getElementById('quizArea');
  if (currentIdx >= questionPool.length) {
    renderScore();
    return;
  }

  const item = questionPool[currentIdx];
  const mod  = modules[item.moduleIdx];
  const pct  = Math.round((currentIdx / questionPool.length) * 100);

  answered = false;

  area.innerHTML = `
    <div class="progress-text">${currentIdx + 1} / ${questionPool.length}</div>
    <div class="progress-bar-wrap">
      <div class="progress-bar" style="width:${pct}%"></div>
    </div>

    <div class="card">
      <div class="module-label">${mod.icon} ${mod.name}</div>
      <div class="question-text">${item.q}</div>
      <div class="options" id="optionsDiv">
        ${item.opts.map((opt, i) => `
          <button class="option-btn" onclick="selectAnswer(${i})">${opt}</button>
        `).join('')}
      </div>
      <div class="feedback" id="feedbackDiv"></div>
    </div>

    <div class="nav-row">
      <button class="nav-btn secondary" onclick="skipQuestion()">⏭ Sari</button>
      <button class="nav-btn" id="nextBtn" onclick="nextQuestion()" disabled>Următoarea →</button>
    </div>
  `;
}

function selectAnswer(idx) {
  if (answered) return;
  answered = true;

  const item    = questionPool[currentIdx];
  const buttons = document.querySelectorAll('.option-btn');
  const fb      = document.getElementById('feedbackDiv');
  const nextBtn = document.getElementById('nextBtn');

  buttons.forEach(b => b.disabled = true);
  buttons[item.ans].classList.add('correct');

  if (idx === item.ans) {
    score++;
    fb.className = 'feedback correct-fb show';
    fb.innerHTML = `✅ <strong>Corect!</strong> ${item.exp}`;
  } else {
    buttons[idx].classList.add('wrong');
    wrongAnswers.push({ ...item, chosen: idx });
    fb.className = 'feedback wrong-fb show';
    fb.innerHTML = `❌ <strong>Incorect.</strong> Răspunsul corect este: <em>${item.opts[item.ans]}</em>.<br>${item.exp}`;
  }

  nextBtn.disabled = false;
}

function nextQuestion() {
  currentIdx++;
  renderQuestion();
}

function skipQuestion() {
  currentIdx++;
  renderQuestion();
}

// =====================================================================
//  SCORE
// =====================================================================
function renderScore() {
  const area  = document.getElementById('quizArea');
  const total = questionPool.length;
  const pct   = Math.round((score / total) * 100);

  let grade, gradeClass;
  if (pct >= 80)      { grade = "🏆 Excelent!";    gradeClass = "excellent"; }
  else if (pct >= 60) { grade = "👍 Bine!";         gradeClass = "good"; }
  else                { grade = "📚 Mai studiază!"; gradeClass = "poor"; }

  const wrongHtml = wrongAnswers.length > 0
    ? `<div style="margin-top:24px;text-align:left;">
        <h3 style="color:#e94560;margin-bottom:12px;">❌ Răspunsuri greșite (${wrongAnswers.length})</h3>
        ${wrongAnswers.map(w => `
          <div style="background:rgba(233,69,96,0.08);border:1px solid rgba(233,69,96,0.3);border-radius:10px;padding:14px;margin-bottom:10px;">
            <div style="font-size:0.9rem;color:#f0f0f0;margin-bottom:6px;">${w.q}</div>
            <div style="font-size:0.82rem;color:#f0a0a0;">❌ Ales: ${w.opts[w.chosen]}</div>
            <div style="font-size:0.82rem;color:#48c78e;">✅ Corect: ${w.opts[w.ans]}</div>
            <div style="font-size:0.8rem;color:#a0aec0;margin-top:4px;">${w.exp}</div>
          </div>
        `).join('')}
      </div>`
    : `<p style="color:#48c78e;margin-top:16px;">🎉 Felicitări! Nicio greșeală!</p>`;

  area.innerHTML = `
    <div class="card score-panel">
      <div class="score-circle" style="--pct:${pct}%">
        <span class="score-number">${pct}%</span>
      </div>
      <h2>Quiz finalizat!</h2>
      <div class="stats-row">
        <div class="stat-box"><div class="val">${score}</div><div class="lbl">Corecte</div></div>
        <div class="stat-box"><div class="val">${total - score}</div><div class="lbl">Greșite</div></div>
        <div class="stat-box"><div class="val">${total}</div><div class="lbl">Total</div></div>
      </div>
      <span class="grade ${gradeClass}">${grade}</span>
      ${wrongHtml}
      <div style="margin-top:28px;display:flex;gap:12px;justify-content:center;flex-wrap:wrap;">
        <button class="nav-btn" onclick="restartQuiz()">🔄 Restart</button>
        <button class="nav-btn secondary" onclick="restartQuiz(true)">🔀 Shuffle nou</button>
      </div>
    </div>
  `;
}

// =====================================================================
//  RESTART
// =====================================================================
function restartQuiz(reshuffle = false) {
  currentIdx   = 0;
  score        = 0;
  wrongAnswers = [];
  if (reshuffle) buildPool(activeModuleIdx);
  renderQuestion();
}

// =====================================================================
//  MODULE BUTTONS
// =====================================================================
document.getElementById('moduleSelector').addEventListener('click', function(e) {
  const btn = e.target.closest('.module-btn');
  if (!btn) return;

  document.querySelectorAll('.module-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');

  const mod = btn.dataset.module;
  activeModuleIdx = mod === "all" ? "all" : parseInt(mod);

  currentIdx   = 0;
  score        = 0;
  wrongAnswers = [];
  buildPool(activeModuleIdx);
  renderQuestion();
});

// =====================================================================
//  INIT
// =====================================================================
buildPool("all");
renderQuestion();
</script>
</body>
</html>
