<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Salvamont — Login</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="login-box">
        <div class="logo">
            <h1>🏔️ SALVAMONT</h1>
            <p>Sistem de Management</p>
        </div>

        <div class="error" id="error-msg" style="display:none;"></div>

        <form id="login-form">
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="username" 
                       placeholder="Introdu email-ul" required>
            </div>
            <div class="form-group">
                <label>Parolă</label>
                <input type="password" id="password" 
                       placeholder="Introdu parola" required>
            </div>
            <button type="submit" id="btn-login">🔐 Autentificare</button>
        </form>
    </div>

    <!-- 1️⃣ Supabase SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <!-- 2️⃣ Config -->
    <script src="js/config.js"></script>
    <!-- 3️⃣ Login -->
    <script src="js/login.js"></script>
</body>
</html>
